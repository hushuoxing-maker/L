<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>零食水果店门头AI · 商业结构增强版 V2</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg,#fff7e6,#ecfff1);
  padding-bottom:60px;
  color:#333;
}

/* HEADER */
.header{
  width:100%;
  background: linear-gradient(90deg,#FF4D2D,#FF9500,#3DDC84);
  color:#fff;
  text-align:center;
  padding:45px 20px;
}
.header h1{font-size:28px;letter-spacing:1px;}
.header p{opacity:0.9;margin-top:8px;font-size:14px;}

/* CONTAINER */
.container{
  max-width:860px;
  margin:30px auto;
  background:#fff;
  border-radius:18px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
  outline:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#FF4D2D,#FF9500);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{opacity:0.9;transform:scale(1.01);}

/* RESULT */
.result{
  max-width:860px;
  margin:30px auto;
}

.item{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-left:4px solid #FF4D2D;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.text{
  flex:1;
  font-size:13px;
  line-height:1.6;
  white-space:pre-wrap;
}

.copy{
  background:#FF4D2D;
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  height:fit-content;
}

.copy-all{
  text-align:center;
  margin-top:20px;
}

.copy-all button{
  width:auto;
  padding:10px 18px;
  border-radius:10px;
}

.copied{
  background:#999 !important;
}

.tip{
  font-size:12px;
  color:#888;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🍊 零食水果店门头AI · 商业结构增强版 V2</h1>
  <p>高人流吸引 · 高食欲转化 · 商业级门头提示词系统</p>
</div>

<div class="container">
  <input id="input" placeholder="输入：店名 + 品类 + 风格（如：鲜优果 水果店 烟火气）">
  <button onclick="go()">生成10组商业门头提示词</button>
  <div class="tip">提示：适用于即梦AI / SD / MJ 门头设计提示词</div>
</div>

<div class="result" id="result"></div>

<script>

const system = {
  核心逻辑:[
    "远距离强识别吸客",
    "近距离激发食欲冲动",
    "视觉冲击 + 品牌记忆点",
    "门头=广告+橱窗+品牌三位一体"
  ],
  材质:[
    "亚克力发光字","吸塑灯箱","铝塑板底","金属烤漆边框",
    "PVC立体字","玻璃贴膜","通体发光结构"
  ],
  灯光:[
    "暖白均匀发光","柔光漫射","高亮不刺眼",
    "内透光灯箱","夜间增强识别"
  ],
  色彩:[
    "橙+红+黄（食欲刺激）",
    "果绿+白（新鲜感）",
    "橙黄渐变（成熟水果感）",
    "红绿对比（零食活力感）"
  ],
  必须:[
    "完整商业街门头正立面",
    "品牌名居中最大",
    "品类名称清晰可见",
    "真实玻璃门结构",
    "产品橱窗展示",
    "真实商铺比例"
  ],
  禁止:[
    "路边摊","临时摊位","夜市结构",
    "虚拟建筑","非实体门头"
  ]
};

function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

function build(name){
  return `商业零食水果门头设计｜${name}\n\n`+
  `核心策略：${r(system.核心逻辑)}\n\n`+
  `结构材质：${r(system.材质)}\n`+
  `灯光设计：${r(system.灯光)}\n`+
  `色彩系统：${r(system.色彩)}\n\n`+
  `必须包含：${system.必须.join("、")}\n`+
  `禁止元素：${system.禁止.join("、")}\n\n`+
  `商业级门头设计，高人流吸引，高转化率，真实可落地商业街铺结构`
}

function go(){
  let val = document.getElementById("input").value.trim()
  if(!val){alert("请输入门头需求");return}

  let list = []
  for(let i=0;i<10;i++) list.push(build(val))

  window.DATA = list

  let html = ""

  list.forEach((t,i)=>{
    html += `
    <div class="item">
      <div class="text">${i+1}.\n${t}</div>
      <button class="copy" onclick="copy(this, \\`${t.replace(/`/g,'')}\\`)" >复制</button>
    </div>`
  })

  html += `<div class="copy-all"><button onclick="copyAll()">一键复制全部10组</button></div>`

  document.getElementById("result").innerHTML = html
}

function copy(btn,text){
  navigator.clipboard.writeText(text)
  btn.classList.add("copied")
  btn.innerText="已复制"
}

function copyAll(){
  navigator.clipboard.writeText(window.DATA.join("\n\n"))
  alert("已复制全部10组提示词")
}

</script>

</body>
</html>
