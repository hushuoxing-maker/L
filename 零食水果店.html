<!DOCTYPE html>
<meta charset="utf-8">
<title>零食水果店门头设计AI · 高转化增强版</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Microsoft YaHei";
  background: linear-gradient(135deg,#fff7e6,#ecfff1);
  padding-bottom:60px;
}

/* HEADER */
.header{
  width:100%;
  background: linear-gradient(90deg,#FF4D2D,#FF9500,#3DDC84);
  color:#fff;
  text-align:center;
  padding:50px 20px;
}
.header h1{font-size:30px;}
.header p{opacity:0.9;margin-top:8px;}

/* CONTAINER */
.container{
  max-width:820px;
  margin:30px auto;
  background:#fff;
  border-radius:18px;
  padding:40px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#FF4D2D,#FF9500);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* RESULT */
.result{
  max-width:820px;
  margin:30px auto;
}

.item{
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-left:4px solid #FF4D2D;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.text{
  flex:1;
  font-size:14px;
  line-height:1.6;
}

.copy{
  background:#FF4D2D;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.copy-all{
  text-align:center;
  margin-top:20px;
}

.copy-all button{
  width:auto;
  padding:10px 20px;
}

/* copied */
.copied{
  background:#ccc !important;
  color:#666 !important;
}
</style>

<div class="header">
  <h1>🍊 零食水果店门头AI · 高转化系统</h1>
  <p>本地流量 / 高人流 / 高食欲 / 强转化门头设计</p>
</div>

<div class="container">
  <input id="input" placeholder="输入：店名 + 品类 + 风格（如：鲜优果 水果店 烟火气）">
  <button onclick="go()" id="btn">生成10组门头提示词</button>
</div>

<div class="result" id="result"></div>

<script>

/* =========================
   核心门头商业系统
========================= */

const system = {
  核心逻辑:[
    "高识别远距离吸客",
    "近距离产生食欲冲动",
    "强视觉对比+高饱和配色",
    "门头=广告牌+产品橱窗+品牌传播三合一"
  ],
  材质:[
    "亚克力发光字","吸塑灯箱","铝塑板底","烤漆金属边框",
    "PVC立体字","玻璃贴膜","局部灯箱画面"
  ],
  灯光:[
    "暖白均匀发光","高亮不刺眼","灯箱内透光","柔光漫射",
    "夜间增强识别白天自然光平衡"
  ],
  色彩:[
    "橙色+红色+黄色（食欲刺激）",
    "果绿+白色（新鲜感）",
    "橙黄渐变（成熟水果感）",
    "红绿对比（零食活力感）"
  ],
  必须:[
    "完整门头正立面",
    "品牌名居中最大",
    "品类名称清晰",
    "玻璃门真实结构",
    "产品展示橱窗",
    "真实商业街铺结构"
  ],
  禁止:[
    "夜市摊位","临时推车","路边小摊",
    "附墙招牌","虚拟门头","非实体建筑"
  ]
}

/* =========================
   工具函数
========================= */

function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

function build(name){
  return `
商业零食水果门头设计，${name}，

核心商业逻辑：${r(system.核心逻辑)}，

门头结构：
${r(system.材质)}，

灯光设计：
${r(system.灯光)}，

色彩系统：
${r(system.色彩)}，

必须包含：
${system.必须.join("、")}，

严格禁止：
${system.禁止.join("、")}，

正立面商业街实景门头设计，高人流吸引，高转化率设计，真实可落地商业门头`
}

/* =========================
   生成逻辑
========================= */

function go(){
  let val = document.getElementById("input").value.trim()
  if(!val){alert("请输入门头需求");return}

  let list = []
  for(let i=0;i<10;i++){
    list.push(build(val))
  }

  let html = ""

  list.forEach((t,i)=>{
    html += `
    <div class="item">
      <div class="text">${i+1}. ${t}</div>
      <button class="copy" onclick="copy(this,'${t.replace(/'/g,"")}')">复制</button>
    </div>
    `
  })

  html += `
  <div class="copy-all">
    <button onclick="copyAll()">一键复制全部10组</button>
  </div>`

  window.DATA = list
  document.getElementById("result").innerHTML = html
}

/* =========================
   复制
========================= */

function copy(btn,text){
  navigator.clipboard.writeText(text)
  btn.classList.add("copied")
}

function copyAll(){
  navigator.clipboard.writeText(window.DATA.join("\n\n"))
  alert("已复制全部10组")
}

</script>
