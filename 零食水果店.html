<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>零食水果店门头AI · 商业结构增强版 V3 | 古月智能体AI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Microsoft YaHei",sans-serif;
  background: linear-gradient(135deg,#fff7e6,#ecfff1);
  padding-bottom:60px;
  color:#333;
}

.header{
  width:100%;
  background: linear-gradient(90deg,#FF4D2D,#FF9500,#3DDC84);
  color:#fff;
  text-align:center;
  padding:45px 20px;
}
.header h1{font-size:28px;}
.header p{opacity:0.9;margin-top:8px;font-size:13px;}

.container{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  border-radius:18px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input,select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#FF4D2D,#FF9500);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}
button:hover{transform:scale(1.01);opacity:0.9;}

.preset{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.preset button{
  flex:1;
  background:#fff;
  color:#FF4D2D;
  border:1px solid #FF4D2D;
  font-size:12px;
  padding:8px;
}

.result{
  max-width:900px;
  margin:30px auto;
}

.item{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-left:4px solid #FF4D2D;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.text{
  flex:1;
  font-size:13px;
  white-space:pre-wrap;
  line-height:1.5;
}

.copy{
  background:#FF4D2D;
  color:#fff;
  border:none;
  padding:7px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  height:fit-content;
}

.copy-all{
  text-align:center;
  margin-top:15px;
}

.copy-all button{
  width:auto;
  padding:10px 18px;
}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  display:none;
  font-size:13px;
}

</style>
</head>

<body>

<div class="header">
  <h1>🍊 零食水果店门头AI · 商业结构增强版 V3</h1>
  <p>爆款门头 / 高转化设计 / 即梦AI提示词系统</p>
</div>

<div class="container">

  <input id="input" placeholder="输入：店名 + 品类">

  <select id="style">
    <option value="烟火气">🔥 烟火气爆款</option>
    <option value="精品高端">💎 精品高端</option>
    <option value="社区亲民">🏪 社区亲民</option>
    <option value="夜市爆款">🌙 夜市爆款</option>
  </select>

  <div class="preset">
    <button onclick="setStyle('烟火气')">烟火气</button>
    <button onclick="setStyle('精品高端')">高端</button>
    <button onclick="setStyle('社区亲民')">社区</button>
    <button onclick="setStyle('夜市爆款')">夜市</button>
  </div>

  <button onclick="go()">生成10组爆款门头提示词</button>

</div>

<div class="result" id="result"></div>

<div class="toast" id="toast">已复制</div>

<script>

const system = {
  core:["高识别吸客","食欲刺激","品牌记忆强化","商业转化设计"],
  material:["亚克力发光字","金属烤漆","吸塑灯箱","铝塑板","通体发光结构"],
  light:["暖白柔光","内透灯箱","高亮不刺眼","夜间增强识别"],
  color:{
    "烟火气":"红+橙+黄",
    "精品高端":"黑+金+白",
    "社区亲民":"绿+白+橙",
    "夜市爆款":"红+紫+橙"
  }
}

function setStyle(v){
  document.getElementById("style").value = v;
}

function r(a){return a[Math.floor(Math.random()*a.length)]}

function build(name,style){
  return `商业门头设计｜${name}\n风格：${style}\n\n`+
  `核心策略：${r(system.core)}\n`+
  `结构材质：${r(system.material)}\n`+
  `灯光设计：${r(system.light)}\n`+
  `色彩系统：${system.color[style]}\n\n`+
  `必须包含：品牌主视觉/清晰品类/橱窗展示/真实商铺结构/夜间识别强化\n`+
  `设计要求：高人流吸引，高转化率，真实可落地商业门头`;
}

function go(){
  let name = document.getElementById("input").value.trim();
  let style = document.getElementById("style").value;

  if(!name){showToast("请输入店名");return;}

  let list=[];
  for(let i=0;i<10;i++) list.push(build(name,style));

  window.DATA = list;

  let html="";

  list.forEach((t,i)=>{
    html+=`
    <div class="item">
      <div class="text">${i+1}.\n${escapeHtml(t)}</div>
      <button class="copy" onclick="copyText(this)">复制</button>
    </div>`;
  });

  html+=`<div class="copy-all"><button onclick="copyAll()">一键复制全部</button></div>`;

  document.getElementById("result").innerHTML = html;
}

function escapeHtml(str){
  return str.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyText(btn){
  let text = btn.parentNode.querySelector(".text").innerText;
  navigator.clipboard.writeText(text);
  btn.innerText="已复制";
  showToast("复制成功");
}

function copyAll(){
  navigator.clipboard.writeText(window.DATA.join("\n\n"));
  showToast("已复制全部");
}

function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

</script>

</body>
</html>
