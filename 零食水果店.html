<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>零食水果店门头AI · 商业结构增强版 V2 | 古月智能体AI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Microsoft YaHei";
  background: linear-gradient(135deg,#fff7e6,#ecfff1);
  padding-bottom:60px;
}

/* HEADER */
.header{
  width:100%;
  background: linear-gradient(90deg,#FF4D2D,#FF9500,#3DDC84);
  color:#fff;
  text-align:center;
  padding:50px 20px;
}
.header h1{font-size:30px;}
.header p{opacity:0.9;margin-top:8px;}

/* INPUT区域 */
.container{
  max-width:820px;
  margin:30px auto;
  background:#fff;
  border-radius:18px;
  padding:40px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#FF4D2D,#FF9500);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* RESULT */
.result{
  max-width:820px;
  margin:30px auto;
}

/* 卡片结构（重点优化） */
.item{
  display:flex;
  background:#fff;
  border-radius:14px;
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  border:1px solid rgba(255,77,45,0.15);
  transition:0.2s;
}

.item:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.10);
}

/* 左侧文本 85% */
.text{
  flex:0 0 85%;
  padding:14px 16px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
  color:#333;
}

/* 右侧操作区 15% */
.action{
  flex:0 0 15%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#fff6f3,#fff);
  border-left:1px solid rgba(255,77,45,0.15);
}

/* 小图标按钮 */
.copy{
  width:34px;
  height:34px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#FF4D2D,#FF9500);
  color:#fff;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 10px rgba(255,77,45,0.25);
  transition:0.2s;
}

.copy:hover{
  transform:scale(1.08);
}

/* 已复制状态 */
.copied{
  background:#ccc !important;
  color:#666 !important;
}

/* 全部复制 */
.copy-all{
  text-align:center;
  margin-top:20px;
}

.copy-all button{
  width:auto;
  padding:10px 20px;
  border-radius:999px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🍊 零食水果店门头AI · 商业结构系统| 古月智能体AI</h1>
  <p>本地流量 / 高人流 / 高食欲 / 强转化门头设计</p>
</div>

<div class="container">
  <input id="input" placeholder="输入：店名 + 品类 + 风格（如：鲜优果 水果店 烟火气）">
  <button onclick="go()">生成10组门头提示词</button>
</div>

<div class="result" id="result"></div>

<script>

/* =========================
   核心系统
========================= */

const system = {
  核心逻辑:[
    "高识别远距离吸客",
    "近距离产生食欲冲动",
    "强视觉对比+高饱和配色",
    "门头=广告牌+产品橱窗+品牌传播三合一"
  ],
  材质:[
    "亚克力发光字","吸塑灯箱","铝塑板底","烤漆金属边框",
    "PVC立体字","玻璃贴膜","局部灯箱画面"
  ],
  灯光:[
    "暖白均匀发光","高亮不刺眼","柔光漫射","灯箱内透光",
    "白天自然光+夜间增强识别"
  ],
  色彩:[
    "橙红黄（食欲刺激）",
    "果绿白（新鲜感）",
    "橙黄渐变（水果成熟感）",
    "红绿对比（零食活力感）"
  ],
  必须:[
    "完全正面展示",
    "正立面商业街真实场景",
    "品牌名居中最大",
    "品类名称清晰",
    "玻璃门真实结构",
    "产品展示橱窗",
    "实体店铺结构真实还原"
  ],
  禁止:[
    "夜市摊位","临时推车","路边小摊","虚拟门头","非实体建筑"
  ]
}

function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

/* 生成提示词 */
function build(name){
  return `商业零食水果门头设计：${name}

核心逻辑：${r(system.核心逻辑)}

材质：${r(system.材质)}

灯光：${r(system.灯光)}

色彩：${r(system.色彩)}

必须包含：
${system.必须.join("、")}

禁止：
${system.禁止.join("、")}

最终要求：
完全正面展示，
真实商业街门头，
高人流吸引，
高转化率实体店设计，
可落地真实施工效果`
}

/* =========================
   生成
========================= */

function go(){
  let val = document.getElementById("input").value.trim()
  if(!val){
    alert("请输入门头需求")
    return
  }

  let list = []
  for(let i=0;i<10;i++){
    list.push(build(val))
  }

  window.DATA = list

  let html = ""

  list.forEach((t,i)=>{
    html += `
    <div class="item">
      <div class="text">${i+1}. ${t}</div>
      <div class="action">
        <button class="copy" onclick="copy(${i},this)">⧉</button>
      </div>
    </div>
    `
  })

  html += `
  <div class="copy-all">
    <button onclick="copyAll()">一键复制全部10组</button>
  </div>
  `

  document.getElementById("result").innerHTML = html
}

/* =========================
   复制功能
========================= */

function copy(index,btn){
  let text = window.DATA[index]

  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("copied")
  }).catch(()=>{
    let ta = document.createElement("textarea")
    ta.value = text
    document.body.appendChild(ta)
    ta.select()
    document.execCommand("copy")
    document.body.removeChild(ta)
  })
}

function copyAll(){
  navigator.clipboard.writeText(window.DATA.join("\n\n"))
  alert("已复制全部10组")
}

</script>

</body>
</html>
